# Kelpie SwiftLint — strict rules, build must fail on violations.

included:
  - apps/ios/Kelpie
  - apps/macos/Kelpie

excluded:
  - apps/ios/.build
  - apps/macos/.build
  - apps/macos/Frameworks

# Promote all warnings to errors so the build fails.
strict: true

# ── Disabled rules ─────────────────────���────────────────────────────────────
disabled_rules:
  - blanket_disable_command

# ── Enabled opt-in rules ────────────────────────────────────────────────────
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

# ── Rule configuration ──────────────────────────────────────────────────────
line_length:
  warning: 200
  error: 300

file_length:
  warning: 1200
  error: 1500

type_body_length:
  warning: 800
  error: 1000

function_body_length:
  warning: 250
  error: 400

function_parameter_count:
  warning: 15
  error: 20

cyclomatic_complexity:
  warning: 15
  error: 25

# Force-unwrap: warn. Many are legitimate (WKNavigation!, string literals).
# Each should be evaluated; truly dangerous ones should be fixed.
force_unwrapping:
  severity: warning

# Force-cast is already at zero in the codebase — keep it an error.
force_cast: error

# Allow large enums (MCP tool lists, route registrations).
large_tuple:
  warning: 4

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - ip
    - js
    - i
    - w
    - h
    - v
    - c
    - s
    - p
    - d
    - n
    - k
    - o
    - t
    - u
    - m
    - b
  allowed_symbols:
    - _

type_name:
  max_length:
    warning: 60
    error: 80

nesting:
  type_level: 3
  function_level: 3
