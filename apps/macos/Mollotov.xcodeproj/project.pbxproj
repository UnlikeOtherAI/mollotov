otov Helper (GPU)\" \"com.mollotov.browser.helper.gpu\"\nstage_helper \"Mollotov Helper (Plugin)\" \"com.mollotov.browser.helper.plugin\"\nstage_helper \"Mollotov Helper (Alerts)\" \"com.mollotov.browser.helper.alerts\"\n";
