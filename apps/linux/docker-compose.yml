version: "3.8"

services:
  mollotov-headless:
    build:
      context: ../..
      dockerfile: apps/linux/Dockerfile
    container_name: mollotov-linux-headless
    ports:
      - "8420:8420"
    volumes:
      - mollotov-data:/data/mollotov
    environment:
      - DISPLAY=:99
      - MOLLOTOV_PROFILE_DIR=/data/mollotov
    restart: unless-stopped
    # Enable mDNS - requires host network for real mDNS, or
    # use port mapping and manual CLI connection
    # network_mode: host  # Uncomment for mDNS discovery

  # Test runner - hits the headless browser API
  test:
    image: curlimages/curl:latest
    depends_on:
      - mollotov-headless
    profiles:
      - test
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for mollotov-headless to start..."
        sleep 5
        echo "--- Health check ---"
        curl -s http://mollotov-headless:8420/health
        echo ""
        echo "--- Device info ---"
        curl -s -X POST http://mollotov-headless:8420/v1/get-device-info -H 'Content-Type: application/json' -d '{}'
        echo ""
        echo "--- Navigate ---"
        curl -s -X POST http://mollotov-headless:8420/v1/navigate -H 'Content-Type: application/json' -d '{"url":"https://example.com"}'
        echo ""
        echo "--- Screenshot ---"
        curl -s -X POST http://mollotov-headless:8420/v1/screenshot -H 'Content-Type: application/json' -d '{}' | head -c 100
        echo ""
        echo "--- Evaluate ---"
        curl -s -X POST http://mollotov-headless:8420/v1/evaluate -H 'Content-Type: application/json' -d '{"expression":"document.title"}'
        echo ""
        echo "=== Tests complete ==="

volumes:
  mollotov-data:
